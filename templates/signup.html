<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up | Voxels</title>
    <style>
        * { box-sizing: border-box; }
        input, select, button, textarea {
            font-family: inherit;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top right, #0f172a, #111827 45%, #030712);
            color: #e5e7eb;
        }
        .card {
            width: min(92vw, 460px);
            background: rgba(17, 24, 39, 0.92);
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.45);
            border: 1px solid rgba(148, 163, 184, 0.22);
        }
        h1 {
            margin: 0 0 8px;
            font-size: 1.85rem;
            color: #f8fafc;
        }
        p.sub {
            margin: 0 0 18px;
            color: #94a3b8;
            font-size: 0.96rem;
        }
        label {
            display: block;
            margin: 10px 0 6px;
            font-weight: 600;
            font-size: 0.9rem;
        }
        input {
            width: 100%;
            border: 1px solid #334155;
            background: #0f172a;
            color: #e2e8f0;
            border-radius: 10px;
            padding: 11px 12px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color .15s ease, box-shadow .15s ease;
        }
        input:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.2);
        }
        button {
            width: 100%;
            margin-top: 18px;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 0.96rem;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #65c9a8, #5ea7ff);
            cursor: pointer;
        }
        button:hover { filter: brightness(1.03); }
        .switch {
            margin-top: 14px;
            text-align: center;
            color: #94a3b8;
            font-size: 0.92rem;
        }
        .switch a {
            color: #93c5fd;
            text-decoration: none;
            font-weight: 700;
        }
        .flash {
            margin-bottom: 10px;
            border-radius: 10px;
            padding: 10px 12px;
            background: rgba(127, 29, 29, 0.28);
            color: #fecaca;
            border: 1px solid rgba(248, 113, 113, 0.45);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Create your Voxels account</h1>
        <p class="sub">Sign up, then you’ll be taken straight into Voxels.</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="flash">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="post" action="{{ url_for('signup_page') }}">
            <label for="display_name">Display name</label>
            <input id="display_name" name="display_name" type="text" required autocomplete="name" />

            <label for="username">Username</label>
            <input id="username" name="username" type="text" required autocomplete="username" />

            <label for="email">Email</label>
            <input id="email" name="email" type="email" required autocomplete="email" />

            <label for="password">Password</label>
            <input id="password" name="password" type="password" required autocomplete="new-password" />

            <button type="submit">Sign Up and Play</button>
        </form>

        <div class="switch">
            Already have an account?
            <a href="{{ url_for('login_page') }}">Log in</a>
        </div>
    </main>
</body>
</html>
