<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Games | Voxels</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top right, #111827, #0b1220 60%, #05070d);
            color: #e5e7eb;
            padding: 30px;
        }
        .wrap { max-width: 980px; margin: 0 auto; }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .topbar a { color: #93c5fd; text-decoration: none; font-weight: 700; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 16px;
        }
        .card {
            background: rgba(17, 24, 39, 0.85);
            border: 1px solid #1e293b;
            border-radius: 14px;
            padding: 16px;
        }
        .thumb {
            width: 100%;
            height: 140px;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid #334155;
            margin-bottom: 10px;
            background: #0f172a;
        }
        .meta { color: #94a3b8; font-size: 0.9rem; margin-bottom: 10px; }
        .play {
            display: inline-block;
            margin-top: 12px;
            background: linear-gradient(135deg, #10b981, #3b82f6);
            color: white;
            text-decoration: none;
            padding: 9px 14px;
            border-radius: 10px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="topbar">
            <h1>My Published Games</h1>
            <div>
                <a href="{{ url_for('game_creator') }}">Create New</a>
                ·
                <a href="{{ url_for('feed_page') }}">Feed</a>
                ·
                <a href="{{ url_for('dashboard') }}">Dashboard</a>
            </div>
        </div>

        <div class="grid">
            {% for game in games %}
                <div class="card">
                    {% if game.thumbnail_url %}
                        <img class="thumb" src="{{ game.thumbnail_url }}" alt="{{ game.title }} thumbnail" />
                    {% endif %}
                    <h3>{{ game.title }}</h3>
                    <div class="meta">{{ game.created_at }}</div>
                    <div>{{ game.description or 'No description yet.' }}</div>
                    <a class="play" href="{{ url_for('play_user_game', game_id=game.id) }}">Play</a>
                </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
